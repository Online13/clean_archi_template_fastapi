_subdirectory: template

project_name:
  type: str
  help: What is your project name?
  default: "{{ project_name|lower|replace('-', '_')|replace(' ', '_') }}"

project_description:
  type: str
  help: Describe your project in a few sentences.

architecture:
  type: str
  help: What architecture do you want to use?
  choices:
    - "Model View Controller (MVC)"
    - "Clean Architecture"
  default: "Clean Architecture"

_message_after_copy: |
  Your project "{{ project_name }}" has been created successfully!

  Next steps:

  1. Change directory to the project root:

      $ cd {{ project_name }}

  2. Install tools 
  - justfile
  - uv

  3. Install dependencies:

      $ uv sync

  4. Start developing your project!

      $ just dev

_tasks:
  - cd "{{ project_name }}" && git init
  - cd "{{ project_name }}" && git branch -M main
  - cd "{{ project_name }}" && git add .
  - cd "{{ project_name }}" && git commit -m "Initial commit"